<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>江西新春发展实时战报</title>
  <style>
    :root {
      --red-deep: #320006;
      --red-main: #8f0711;
      --red-bright: #d4211f;
      --gold: #ffd36a;
      --gold-soft: #ffecae;
      --orange: #ff8a24;
      --panel: rgba(85, 4, 10, 0.72);
      --panel-strong: rgba(112, 9, 13, 0.82);
      --line: rgba(255, 211, 106, 0.62);
      --text: #fff5d7;
      --muted: rgba(255, 236, 174, 0.74);
      --shadow: rgba(255, 195, 74, 0.36);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 193, 78, 0.22) 0, rgba(255, 193, 78, 0) 32%),
        linear-gradient(135deg, #420006 0%, #8c0711 42%, #5e0209 68%, #220004 100%);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255, 226, 150, 0.88) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(255, 148, 70, 0.44) 0 1px, transparent 1.5px);
      background-size: 108px 108px, 166px 166px;
      background-position: 18px 22px, 80px 52px;
      opacity: 0.32;
      animation: starDrift 18s linear infinite;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255, 211, 106, 0) 0, rgba(255, 211, 106, 0.18) 50%, rgba(255, 211, 106, 0) 100%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.04) 0 1px, transparent 1px 110px);
      mix-blend-mode: screen;
      opacity: 0.2;
    }

    .fireworks {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.9;
    }

    .screen {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
      padding: 22px 30px 18px;
      overflow: hidden;
    }

    .decor-lantern {
      position: absolute;
      top: 18px;
      width: 70px;
      height: 94px;
      pointer-events: none;
      filter: drop-shadow(0 0 18px rgba(255, 196, 74, 0.42));
      animation: lanternFloat 4.8s ease-in-out infinite;
    }

    .decor-lantern.left {
      left: 42px;
    }

    .decor-lantern.right {
      right: 42px;
      animation-delay: 0.9s;
    }

    .decor-lantern::before {
      content: "";
      position: absolute;
      left: 22px;
      top: -12px;
      width: 26px;
      height: 20px;
      border-top: 2px solid rgba(255, 229, 158, 0.86);
      border-left: 2px solid rgba(255, 229, 158, 0.3);
      border-right: 2px solid rgba(255, 229, 158, 0.3);
      border-radius: 50% 50% 0 0;
    }

    .lantern-body {
      position: absolute;
      inset: 8px 10px 22px;
      border: 2px solid rgba(255, 218, 115, 0.9);
      border-radius: 48% / 36%;
      background:
        linear-gradient(90deg, rgba(255, 224, 135, 0.22), transparent 18%, transparent 82%, rgba(255, 224, 135, 0.22)),
        radial-gradient(circle at 50% 28%, #ff5b3b 0, #d61e1b 34%, #8a0710 100%);
    }

    .lantern-body::before,
    .lantern-body::after {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      height: 7px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .lantern-body::before {
      top: 7px;
    }

    .lantern-body::after {
      bottom: 7px;
    }

    .lantern-tail {
      position: absolute;
      left: 33px;
      bottom: 0;
      width: 4px;
      height: 24px;
      border-radius: 999px;
      background: linear-gradient(var(--gold), #ff4c1a);
    }

    .lantern-tail::before {
      content: "";
      position: absolute;
      left: -10px;
      bottom: -11px;
      width: 24px;
      height: 14px;
      border-radius: 0 0 16px 16px;
      background: linear-gradient(90deg, #ffbc41, #ff5f1c, #ffbc41);
    }

    .cloud {
      position: absolute;
      pointer-events: none;
      width: 240px;
      height: 72px;
      border-top: 2px solid rgba(255, 217, 126, 0.28);
      border-bottom: 2px solid rgba(255, 217, 126, 0.14);
      opacity: 0.72;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      border: 2px solid rgba(255, 217, 126, 0.24);
      border-left: 0;
      border-bottom: 0;
      border-radius: 0 38px 0 0;
    }

    .cloud::before {
      left: 28px;
      top: 15px;
      width: 88px;
      height: 36px;
    }

    .cloud::after {
      right: 18px;
      top: 26px;
      width: 118px;
      height: 30px;
    }

    .cloud.one {
      left: 110px;
      bottom: 72px;
    }

    .cloud.two {
      right: 140px;
      top: 126px;
      transform: scaleX(-1);
    }

    .header {
      position: relative;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      min-height: 86px;
      padding: 4px 94px 8px;
    }

    .title-wrap {
      grid-column: 2;
      text-align: center;
    }

    .board-title {
      margin: 0;
      font-size: 48px;
      line-height: 1.08;
      font-weight: 800;
      color: var(--gold-soft);
      text-shadow:
        0 0 8px rgba(255, 224, 139, 0.82),
        0 0 26px rgba(255, 161, 39, 0.54),
        0 3px 0 rgba(95, 11, 0, 0.72);
      animation: titleGlow 2.8s ease-in-out infinite;
    }

    .title-subline {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-top: 8px;
      font-size: 16px;
      color: rgba(255, 236, 174, 0.78);
    }

    .title-subline::before,
    .title-subline::after {
      content: "";
      width: 122px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .status-box {
      justify-self: end;
      min-width: 320px;
      padding: 12px 16px;
      border: 1px solid rgba(255, 211, 106, 0.42);
      border-radius: 8px;
      background: rgba(80, 0, 8, 0.46);
      box-shadow: inset 0 0 18px rgba(255, 183, 66, 0.12);
      text-align: right;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.75;
    }

    .status-strong {
      color: var(--gold-soft);
      font-weight: 700;
    }

    .content {
      display: grid;
      flex: 1;
      min-height: 0;
      grid-template-columns: minmax(500px, 34%) minmax(0, 1fr);
      gap: 20px;
    }

    .panel,
    .metric-card,
    .hero-panel,
    .trend-panel {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(118, 10, 14, 0.78), rgba(61, 0, 7, 0.72)),
        radial-gradient(circle at 50% 0%, rgba(255, 211, 106, 0.2), transparent 48%);
      box-shadow:
        inset 0 0 22px rgba(255, 215, 111, 0.12),
        0 0 24px rgba(98, 0, 8, 0.38),
        0 0 20px rgba(255, 176, 47, 0.08);
      overflow: hidden;
    }

    .panel::before,
    .metric-card::before,
    .hero-panel::before,
    .trend-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, transparent, rgba(255, 233, 165, 0.18), transparent);
      transform: translateX(-120%);
      animation: panelShine 5.8s ease-in-out infinite;
    }

    .rank-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 18px 18px 16px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .panel-title h2 {
      margin: 0;
      color: var(--gold-soft);
      font-size: 24px;
      font-weight: 800;
      text-shadow: 0 0 12px rgba(255, 199, 78, 0.42);
    }

    .panel-title span {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .rank-list {
      display: grid;
      grid-template-rows: repeat(11, minmax(0, 1fr));
      flex: 1;
      min-height: 0;
      gap: 8px;
    }

    .rank-row {
      display: grid;
      grid-template-columns: 42px minmax(50px, 70px) minmax(0, 1fr) 80px;
      align-items: center;
      gap: 11px;
      min-height: 0;
      padding: 8px 10px;
      border: 1px solid rgba(255, 211, 106, 0.18);
      border-radius: 8px;
      background: linear-gradient(90deg, rgba(255, 211, 106, 0.09), rgba(255, 255, 255, 0.03));
      transition: transform 0.3s ease, border-color 0.3s ease, background 0.3s ease;
    }

    .rank-row.top {
      border-color: rgba(255, 221, 126, 0.52);
      background: linear-gradient(90deg, rgba(255, 204, 78, 0.17), rgba(255, 81, 33, 0.08));
    }

    .rank-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: 1px solid rgba(255, 211, 106, 0.48);
      border-radius: 50%;
      background: rgba(61, 0, 7, 0.62);
      color: var(--gold-soft);
      font-size: 15px;
      font-weight: 800;
      box-shadow: 0 0 12px rgba(255, 180, 48, 0.16);
    }

    .rank-row.top .rank-badge {
      background: linear-gradient(145deg, #fff0aa, #ff9b31 58%, #b31610);
      color: #5d0800;
      box-shadow: 0 0 18px rgba(255, 197, 65, 0.44);
    }

    .city-name {
      overflow: hidden;
      color: #fff4d2;
      font-size: 19px;
      font-weight: 800;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .city-progress-wrap {
      min-width: 0;
    }

    .city-values {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 12px;
      color: rgba(255, 236, 174, 0.72);
    }

    .city-current {
      color: var(--gold-soft);
      font-size: 18px;
      font-weight: 800;
    }

    .progress-track {
      width: 100%;
      height: 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.13);
      overflow: hidden;
    }

    .progress-bar {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ff6b22, #ffcb52, #fff1a8);
      box-shadow: 0 0 14px rgba(255, 192, 65, 0.56);
      transition: width 0.9s ease;
    }

    .city-rate {
      color: var(--gold-soft);
      font-size: 17px;
      font-weight: 800;
      text-align: right;
      white-space: nowrap;
    }

    .stage {
      display: grid;
      min-height: 0;
      grid-template-rows: auto auto minmax(230px, 1fr);
      gap: 16px;
    }

    .hero-panel {
      padding: 26px 30px 24px;
      text-align: center;
    }

    .hero-label {
      color: rgba(255, 236, 174, 0.84);
      font-size: 22px;
      font-weight: 700;
    }

    .total-number {
      margin-top: 8px;
      color: #fff7cc;
      font-family: Impact, "Arial Black", "Microsoft YaHei", sans-serif;
      font-size: 112px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      text-shadow:
        0 0 8px rgba(255, 244, 190, 0.96),
        0 0 26px rgba(255, 192, 57, 0.82),
        0 0 52px rgba(255, 81, 33, 0.42);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .total-number.pulse {
      animation: numberPulse 0.72s ease;
    }

    .hero-meta {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin-top: 13px;
      color: rgba(255, 236, 174, 0.75);
      font-size: 15px;
      flex-wrap: wrap;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .metric-card {
      min-height: 122px;
      padding: 18px 18px 16px;
    }

    .metric-label {
      color: rgba(255, 236, 174, 0.75);
      font-size: 16px;
      font-weight: 700;
    }

    .metric-value {
      margin-top: 12px;
      color: var(--gold-soft);
      font-size: 32px;
      line-height: 1.1;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 16px rgba(255, 190, 63, 0.42);
      word-break: keep-all;
    }

    .metric-note {
      margin-top: 10px;
      color: rgba(255, 236, 174, 0.58);
      font-size: 12px;
      white-space: nowrap;
    }

    .trend-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 18px 20px 16px;
    }

    .trend-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .trend-head h2 {
      margin: 0;
      color: var(--gold-soft);
      font-size: 24px;
      font-weight: 800;
    }

    .trend-legend {
      display: flex;
      align-items: center;
      gap: 14px;
      color: rgba(255, 236, 174, 0.72);
      font-size: 13px;
      white-space: nowrap;
    }

    .legend-line {
      display: inline-block;
      width: 34px;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff7a24, #ffe69c);
      box-shadow: 0 0 12px rgba(255, 207, 85, 0.58);
      vertical-align: middle;
    }

    .trend-canvas-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
    }

    #trendChart {
      display: block;
      width: 100%;
      height: 100%;
    }

    .footer {
      display: flex;
      justify-content: center;
      gap: 22px;
      padding-top: 13px;
      color: rgba(255, 236, 174, 0.68);
      font-size: 14px;
      text-align: center;
      flex-wrap: wrap;
    }

    .footer strong {
      color: var(--gold-soft);
      font-weight: 700;
    }

    @keyframes titleGlow {
      0%,
      100% {
        filter: brightness(1);
      }
      50% {
        filter: brightness(1.16);
      }
    }

    @keyframes numberPulse {
      0% {
        transform: scale(1);
      }
      44% {
        transform: scale(1.018);
      }
      100% {
        transform: scale(1);
      }
    }

    @keyframes lanternFloat {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(8px);
      }
    }

    @keyframes starDrift {
      from {
        background-position: 18px 22px, 80px 52px;
      }
      to {
        background-position: 126px 130px, 246px 218px;
      }
    }

    @keyframes panelShine {
      0%,
      72% {
        transform: translateX(-120%);
      }
      100% {
        transform: translateX(120%);
      }
    }

    @media (max-width: 1280px) {
      body {
        overflow: auto;
      }

      .screen {
        height: auto;
        min-height: 100vh;
        overflow: visible;
        padding: 18px;
      }

      .header {
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 8px 72px;
      }

      .title-wrap,
      .status-box {
        grid-column: 1;
      }

      .status-box {
        justify-self: center;
        text-align: center;
      }

      .content {
        grid-template-columns: 1fr;
      }

      .rank-list {
        grid-template-rows: none;
      }

      .rank-row {
        min-height: 62px;
      }

      .total-number {
        font-size: 82px;
      }
    }

    @media (max-width: 820px) {
      .decor-lantern,
      .cloud {
        display: none;
      }

      .screen {
        padding: 14px;
      }

      .header {
        padding: 4px 0 10px;
      }

      .board-title {
        font-size: 34px;
      }

      .title-subline::before,
      .title-subline::after {
        width: 58px;
      }

      .status-box {
        min-width: 0;
        width: 100%;
      }

      .hero-panel {
        padding: 22px 14px;
      }

      .total-number {
        font-size: 48px;
        white-space: normal;
      }

      .metrics {
        grid-template-columns: 1fr 1fr;
      }

      .metric-value {
        font-size: 24px;
      }

      .rank-row {
        grid-template-columns: 36px 54px minmax(0, 1fr);
      }

      .city-rate {
        grid-column: 3;
        text-align: left;
      }

      .trend-head {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <canvas class="fireworks" id="fireworks"></canvas>

  <div class="screen">
    <div class="decor-lantern left" aria-hidden="true">
      <div class="lantern-body"></div>
      <div class="lantern-tail"></div>
    </div>
    <div class="decor-lantern right" aria-hidden="true">
      <div class="lantern-body"></div>
      <div class="lantern-tail"></div>
    </div>
    <div class="cloud one" aria-hidden="true"></div>
    <div class="cloud two" aria-hidden="true"></div>

    <header class="header">
      <div></div>
      <div class="title-wrap">
        <h1 class="board-title" id="boardTitle">江西新春发展实时战报</h1>
        <div class="title-subline">新春发展量滚动展示</div>
      </div>
      <div class="status-box">
        <div>当前时间：<span class="status-strong" id="currentTime">--</span></div>
        <div><span class="status-strong">数据滚动展示中</span></div>
      </div>
    </header>

    <main class="content">
      <section class="panel rank-panel">
        <div class="panel-title">
          <h2>江西 11 个地市排行</h2>
          <span>按当前发展量自动排序</span>
        </div>
        <div class="rank-list" id="rankList"></div>
      </section>

      <section class="stage">
        <div class="hero-panel">
          <div class="hero-label">累计发展量</div>
          <div class="total-number" id="totalNumber">0</div>
          <div class="hero-meta">
            <span>全省目标：<strong id="provinceTarget">0</strong></span>
            <span>活动进度：<strong id="activityProgress">0.0%</strong></span>
            <span>活动周期：<strong id="activityPeriod">--</strong></span>
          </div>
        </div>

        <div class="metrics">
          <div class="metric-card">
            <div class="metric-label">今日新增</div>
            <div class="metric-value" id="todayNew">0</div>
            <div class="metric-note">按当前活动进度估算</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">本小时新增</div>
            <div class="metric-value" id="hourNew">0</div>
            <div class="metric-note">按当前小时进度估算</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">目标完成率</div>
            <div class="metric-value" id="finishRate">0.0%</div>
            <div class="metric-note">累计量 / 全省目标</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">剩余目标</div>
            <div class="metric-value" id="remainingTarget">0</div>
            <div class="metric-note">全省目标 - 当前累计</div>
          </div>
        </div>

        <div class="trend-panel">
          <div class="trend-head">
            <h2>春节活动累计趋势</h2>
            <div class="trend-legend"><span class="legend-line"></span> 累计发展趋势</div>
          </div>
          <div class="trend-canvas-wrap">
            <canvas id="trendChart"></canvas>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span>数据按活动周期滚动展示</span>
      <span>最后刷新时间：<strong id="lastRefresh">--</strong></span>
    </footer>
  </div>

  <script>
    /*
     * =========================
     * 配置区：以后主要改这里
     * =========================
     *
     * 1. boardTitle：页面大标题。
     * 2. startTime / endTime：活动开始时间和结束时间，格式固定为 "年-月-日 时:分:秒"。
     * 3. provinceTargetValue：全省总目标量。填 null 时，页面会自动按各地市目标量相加。
     * 4. refreshSeconds：数字刷新间隔，建议 1 或 2。
     * 5. cities：11 个地市配置。
     *    - name：地市名称。
     *    - startValue：本阶段起始量。后续人工修正数据时，把真实已完成量填到这里。
     *    - targetValue：本阶段最终目标量。
     *
     * 说明：
     * - 当前默认时间设置为覆盖今天，方便双击 index.html 后马上看到数字滚动。
     * - 正式春节活动使用时，把 startTime / endTime 改成实际活动周期即可。
     * - 如果 2 月 5 日人工核对后，南昌已有 300 万，就把南昌 startValue 改为 3000000，
     *   同时把 startTime 改为 "2026-02-05 10:00:00"，页面会从新的基础继续往上跑。
     */
    const CONFIG = {
      boardTitle: "江西新春发展实时战报",

      startTime: "2026-07-10 00:00:00",
      endTime: "2026-07-24 23:59:59",

      provinceTargetValue: 50000000,
      refreshSeconds: 2,

      cities: [
        { name: "南昌", startValue: 0, targetValue: 10000000 },
        { name: "赣州", startValue: 0, targetValue: 20000000 },
        { name: "九江", startValue: 0, targetValue: 6000000 },
        { name: "上饶", startValue: 0, targetValue: 2000000 },
        { name: "宜春", startValue: 0, targetValue: 3000000 },
        { name: "吉安", startValue: 0, targetValue: 3000000 },
        { name: "抚州", startValue: 0, targetValue: 2000000 },
        { name: "景德镇", startValue: 0, targetValue: 1000000 },
        { name: "萍乡", startValue: 0, targetValue: 1000000 },
        { name: "新余", startValue: 0, targetValue: 1000000 },
        { name: "鹰潭", startValue: 0, targetValue: 1000000 }
      ]
    };
  </script>

  <script>
    const refs = {
      boardTitle: document.getElementById("boardTitle"),
      currentTime: document.getElementById("currentTime"),
      totalNumber: document.getElementById("totalNumber"),
      provinceTarget: document.getElementById("provinceTarget"),
      activityProgress: document.getElementById("activityProgress"),
      activityPeriod: document.getElementById("activityPeriod"),
      todayNew: document.getElementById("todayNew"),
      hourNew: document.getElementById("hourNew"),
      finishRate: document.getElementById("finishRate"),
      remainingTarget: document.getElementById("remainingTarget"),
      lastRefresh: document.getElementById("lastRefresh"),
      rankList: document.getElementById("rankList"),
      trendChart: document.getElementById("trendChart"),
      fireworks: document.getElementById("fireworks")
    };

    const numberFormatter = new Intl.NumberFormat("zh-CN");
    const animatedValues = new Map();
    const rankRows = new Map();

    let latestSnapshot = null;
    let resizeTimer = null;

    function toDate(value) {
      return new Date(String(value).replace(/-/g, "/"));
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function formatNumber(value) {
      return numberFormatter.format(Math.max(0, Math.round(value)));
    }

    function formatPercent(value) {
      return `${(clamp(value, 0, 1) * 100).toFixed(1)}%`;
    }

    function formatDateTime(date) {
      const pad = (num) => String(num).padStart(2, "0");
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
    }

    function formatShortDate(value) {
      const date = toDate(value);
      const pad = (num) => String(num).padStart(2, "0");
      return `${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
    }

    function getStartDate() {
      return toDate(CONFIG.startTime);
    }

    function getEndDate() {
      return toDate(CONFIG.endTime);
    }

    function getProvinceTarget() {
      const configured = Number(CONFIG.provinceTargetValue);
      if (Number.isFinite(configured) && configured > 0) {
        return configured;
      }
      return CONFIG.cities.reduce((sum, city) => sum + Math.max(0, Number(city.targetValue) || 0), 0);
    }

    function progressAt(date) {
      const start = getStartDate().getTime();
      const end = getEndDate().getTime();
      const current = date.getTime();
      if (!Number.isFinite(start) || !Number.isFinite(end) || end <= start) {
        return 1;
      }
      return clamp((current - start) / (end - start), 0, 1);
    }

    function cityProgressCurve(progress, index) {
      const rhythm = 0.94 + ((index * 37) % 12) / 100;
      return clamp(progress * rhythm + progress * progress * (1 - rhythm), 0, 1);
    }

    function getCityValueAt(city, date, index) {
      const target = Math.max(0, Number(city.targetValue) || 0);
      const startValue = clamp(Number(city.startValue) || 0, 0, target);
      const progress = cityProgressCurve(progressAt(date), index);
      return clamp(startValue + (target - startValue) * progress, startValue, target);
    }

    function getSnapshot(date) {
      const provinceTarget = getProvinceTarget();
      const progress = progressAt(date);
      const cities = CONFIG.cities.map((city, index) => {
        const current = getCityValueAt(city, date, index);
        const target = Math.max(0, Number(city.targetValue) || 0);
        return {
          name: city.name,
          current,
          target,
          rate: target > 0 ? current / target : 0
        };
      });
      const total = cities.reduce((sum, city) => sum + city.current, 0);
      const dayStart = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      const hourStart = new Date(date.getFullYear(), date.getMonth(), date.getDate(), date.getHours());
      const totalAtDayStart = getTotalAt(dayStart);
      const totalAtHourStart = getTotalAt(hourStart);

      return {
        now: date,
        progress,
        cities,
        total,
        provinceTarget,
        todayNew: Math.max(0, total - totalAtDayStart),
        hourNew: Math.max(0, total - totalAtHourStart),
        finishRate: provinceTarget > 0 ? total / provinceTarget : 0,
        remaining: Math.max(0, provinceTarget - total)
      };
    }

    function getTotalAt(date) {
      return CONFIG.cities.reduce((sum, city, index) => sum + getCityValueAt(city, date, index), 0);
    }

    function easeOutCubic(value) {
      return 1 - Math.pow(1 - value, 3);
    }

    function animateValue(key, element, nextValue, formatter, duration) {
      const previous = animatedValues.get(key);
      const from = previous ? previous.current : nextValue;
      const startTime = performance.now();

      if (previous && previous.frame) {
        cancelAnimationFrame(previous.frame);
      }

      const state = { current: from, frame: null };
      animatedValues.set(key, state);

      function step(now) {
        const ratio = clamp((now - startTime) / duration, 0, 1);
        const value = from + (nextValue - from) * easeOutCubic(ratio);
        state.current = value;
        element.textContent = formatter(value);

        if (ratio < 1) {
          state.frame = requestAnimationFrame(step);
        } else {
          state.current = nextValue;
          state.frame = null;
          element.textContent = formatter(nextValue);
        }
      }

      state.frame = requestAnimationFrame(step);
    }

    function createRankRow(name) {
      const row = document.createElement("div");
      row.className = "rank-row";
      row.innerHTML = `
        <div class="rank-badge"></div>
        <div class="city-name"></div>
        <div class="city-progress-wrap">
          <div class="city-values">
            <span class="city-current"></span>
            <span class="city-target"></span>
          </div>
          <div class="progress-track">
            <div class="progress-bar"></div>
          </div>
        </div>
        <div class="city-rate"></div>
      `;
      rankRows.set(name, row);
      return row;
    }

    function renderRanking(cities) {
      const sorted = [...cities].sort((a, b) => b.current - a.current);
      const fragment = document.createDocumentFragment();

      sorted.forEach((city, index) => {
        const row = rankRows.get(city.name) || createRankRow(city.name);
        row.classList.toggle("top", index < 3);
        row.querySelector(".rank-badge").textContent = index + 1;
        row.querySelector(".city-name").textContent = city.name;
        row.querySelector(".city-current").textContent = formatNumber(city.current);
        row.querySelector(".city-target").textContent = `目标 ${formatNumber(city.target)}`;
        row.querySelector(".city-rate").textContent = formatPercent(city.rate);
        row.querySelector(".progress-bar").style.width = `${clamp(city.rate, 0, 1) * 100}%`;
        fragment.appendChild(row);
      });

      refs.rankList.appendChild(fragment);
    }

    function render() {
      const now = new Date();
      latestSnapshot = getSnapshot(now);
      const duration = Math.max(650, Number(CONFIG.refreshSeconds || 2) * 850);

      refs.boardTitle.textContent = CONFIG.boardTitle;
      refs.currentTime.textContent = formatDateTime(now);
      refs.provinceTarget.textContent = formatNumber(latestSnapshot.provinceTarget);
      refs.activityProgress.textContent = formatPercent(latestSnapshot.progress);
      refs.activityPeriod.textContent = `${formatShortDate(CONFIG.startTime)} 至 ${formatShortDate(CONFIG.endTime)}`;
      refs.lastRefresh.textContent = formatDateTime(now);

      animateValue("total", refs.totalNumber, latestSnapshot.total, formatNumber, duration);
      animateValue("todayNew", refs.todayNew, latestSnapshot.todayNew, formatNumber, duration);
      animateValue("hourNew", refs.hourNew, latestSnapshot.hourNew, formatNumber, duration);
      animateValue("finishRate", refs.finishRate, latestSnapshot.finishRate, formatPercent, duration);
      animateValue("remaining", refs.remainingTarget, latestSnapshot.remaining, formatNumber, duration);

      refs.totalNumber.classList.remove("pulse");
      void refs.totalNumber.offsetWidth;
      refs.totalNumber.classList.add("pulse");

      renderRanking(latestSnapshot.cities);
      drawTrend();
    }

    function updateClockOnly() {
      refs.currentTime.textContent = formatDateTime(new Date());
    }

    function setupTrendCanvas() {
      const canvas = refs.trendChart;
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * dpr));
      canvas.height = Math.max(1, Math.floor(rect.height * dpr));
      const ctx = canvas.getContext("2d");
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return { canvas, ctx, width: rect.width, height: rect.height };
    }

    function drawTrend() {
      const { ctx, width, height } = setupTrendCanvas();
      if (!width || !height) {
        return;
      }

      const now = latestSnapshot ? latestSnapshot.now : new Date();
      const start = getStartDate();
      const end = getEndDate();
      const provinceTarget = getProvinceTarget();
      const left = 50;
      const right = 28;
      const top = 20;
      const bottom = 38;
      const chartWidth = width - left - right;
      const chartHeight = height - top - bottom;

      ctx.clearRect(0, 0, width, height);
      ctx.font = "13px Microsoft YaHei, Arial";
      ctx.lineWidth = 1;
      ctx.strokeStyle = "rgba(255, 229, 158, 0.16)";
      ctx.fillStyle = "rgba(255, 236, 174, 0.56)";

      for (let i = 0; i <= 4; i += 1) {
        const y = top + (chartHeight / 4) * i;
        ctx.beginPath();
        ctx.moveTo(left, y);
        ctx.lineTo(left + chartWidth, y);
        ctx.stroke();
        const labelValue = provinceTarget * (1 - i / 4);
        ctx.fillText(formatNumber(labelValue), 8, y + 4);
      }

      const points = [];
      const steps = 72;
      const startMs = start.getTime();
      const endMs = end.getTime();
      const span = Math.max(1, endMs - startMs);

      for (let i = 0; i <= steps; i += 1) {
        const t = i / steps;
        const sample = new Date(startMs + span * t);
        const value = getTotalAt(sample);
        const x = left + chartWidth * t;
        const y = top + chartHeight * (1 - clamp(value / Math.max(1, provinceTarget), 0, 1));
        points.push({ x, y });
      }

      const fillGradient = ctx.createLinearGradient(0, top, 0, top + chartHeight);
      fillGradient.addColorStop(0, "rgba(255, 214, 102, 0.34)");
      fillGradient.addColorStop(1, "rgba(255, 94, 31, 0.02)");
      ctx.beginPath();
      points.forEach((point, index) => {
        if (index === 0) {
          ctx.moveTo(point.x, point.y);
        } else {
          ctx.lineTo(point.x, point.y);
        }
      });
      ctx.lineTo(left + chartWidth, top + chartHeight);
      ctx.lineTo(left, top + chartHeight);
      ctx.closePath();
      ctx.fillStyle = fillGradient;
      ctx.fill();

      const lineGradient = ctx.createLinearGradient(left, 0, left + chartWidth, 0);
      lineGradient.addColorStop(0, "#ff6b22");
      lineGradient.addColorStop(0.55, "#ffd25f");
      lineGradient.addColorStop(1, "#fff3b0");
      ctx.beginPath();
      points.forEach((point, index) => {
        if (index === 0) {
          ctx.moveTo(point.x, point.y);
        } else {
          ctx.lineTo(point.x, point.y);
        }
      });
      ctx.strokeStyle = lineGradient;
      ctx.lineWidth = 4;
      ctx.shadowColor = "rgba(255, 203, 82, 0.62)";
      ctx.shadowBlur = 14;
      ctx.stroke();
      ctx.shadowBlur = 0;

      const currentRatio = clamp((now.getTime() - startMs) / span, 0, 1);
      const markerX = left + chartWidth * currentRatio;
      const markerY = top + chartHeight * (1 - clamp((latestSnapshot ? latestSnapshot.total : getTotalAt(now)) / Math.max(1, provinceTarget), 0, 1));
      ctx.strokeStyle = "rgba(255, 239, 174, 0.42)";
      ctx.lineWidth = 1;
      ctx.setLineDash([5, 7]);
      ctx.beginPath();
      ctx.moveTo(markerX, top);
      ctx.lineTo(markerX, top + chartHeight);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.beginPath();
      ctx.arc(markerX, markerY, 6, 0, Math.PI * 2);
      ctx.fillStyle = "#fff2a4";
      ctx.shadowColor = "rgba(255, 218, 95, 0.9)";
      ctx.shadowBlur = 18;
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.fillStyle = "rgba(255, 236, 174, 0.72)";
      ctx.fillText(formatShortDate(CONFIG.startTime), left, height - 10);
      ctx.textAlign = "right";
      ctx.fillText(formatShortDate(CONFIG.endTime), left + chartWidth, height - 10);
      ctx.textAlign = "left";
    }

    function setupFireworksCanvas() {
      const canvas = refs.fireworks;
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      const ctx = canvas.getContext("2d");
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return ctx;
    }

    let fireworksContext = setupFireworksCanvas();
    const particles = [];

    function spawnFirework() {
      const x = Math.random() * window.innerWidth;
      const y = 80 + Math.random() * window.innerHeight * 0.44;
      const count = 18 + Math.floor(Math.random() * 12);
      const colors = ["#fff1a8", "#ffd05c", "#ff7a2f", "#ff4040"];

      for (let i = 0; i < count; i += 1) {
        const angle = (Math.PI * 2 * i) / count;
        const speed = 0.55 + Math.random() * 1.8;
        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 46 + Math.random() * 20,
          age: 0,
          color: colors[Math.floor(Math.random() * colors.length)]
        });
      }
    }

    function animateFireworks() {
      const ctx = fireworksContext;
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      if (particles.length < 180 && Math.random() < 0.035) {
        spawnFirework();
      }

      for (let i = particles.length - 1; i >= 0; i -= 1) {
        const particle = particles[i];
        particle.age += 1;
        particle.x += particle.vx;
        particle.y += particle.vy;
        particle.vy += 0.018;
        const alpha = 1 - particle.age / particle.life;

        if (alpha <= 0) {
          particles.splice(i, 1);
          continue;
        }

        ctx.globalAlpha = alpha * 0.78;
        ctx.fillStyle = particle.color;
        ctx.beginPath();
        ctx.arc(particle.x, particle.y, 1.8, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.globalAlpha = 1;
      requestAnimationFrame(animateFireworks);
    }

    function handleResize() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        fireworksContext = setupFireworksCanvas();
        drawTrend();
      }, 120);
    }

    window.addEventListener("resize", handleResize);

    refs.boardTitle.textContent = CONFIG.boardTitle;
    render();
    setInterval(updateClockOnly, 1000);
    setInterval(render, Math.max(1, Number(CONFIG.refreshSeconds) || 2) * 1000);
    requestAnimationFrame(animateFireworks);
  </script>
</body>
</html>
